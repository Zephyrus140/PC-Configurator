<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberRig — Конфигуратор ПК</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- ═══ NAVBAR ═══════════════════════════════════════════════════════════════ -->
<nav class="top-bar">
  <div class="d-flex align-items-center gap-2">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Меню">
      <i class="bi bi-list"></i>
    </button>
    <div class="logo-text">CYBER<span class="accent">RIG</span></div>
  </div>
  <div class="d-flex align-items-center gap-2">
    <button class="my-builds-btn" onclick="openMyBuildsModal()">
      <i class="bi bi-collection"></i><span data-i18n="my_builds">Мои сборки</span>
    </button>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </div>
</nav>

<!-- ═══ SIDEBAR OVERLAY (mobile) ══════════════════════════════════════════════ -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ═══ LAYOUT ═══════════════════════════════════════════════════════════════ -->
<div class="configurator-wrapper">

  <!-- ─── SIDEBAR ─────────────────────────────────────────────────────────── -->
  <aside class="configurator-sidebar">
    <div class="sidebar-heading" data-i18n="sidebar_heading">Шаги конфигурации</div>
    <div id="sidebarSteps"></div>
    <div class="sidebar-footer">
      <div class="total-box">
        <div class="total-box-label" data-i18n="total_price">Итоговая стоимость</div>
        <div class="total-box-value" id="totalPriceSidebar">$0.00</div>
        <button class="btn btn-accent btn-sm w-100" id="btnSaveConfig">
          <i class="bi bi-card-checklist me-1"></i><span data-i18n="view_build">Просмотр сборки</span>
        </button>
        <button class="btn btn-outline-secondary btn-sm w-100 mt-2" onclick="resetBuild()">
          <i class="bi bi-arrow-counterclockwise me-1"></i><span data-i18n="reset_build">Сбросить сборку</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- ─── MAIN CONTENT ─────────────────────────────────────────────────────── -->
  <main class="configurator-main">

    <!-- Progress -->
    <div class="progress-bar-label" id="stepProgressLabel">Шаг 1 / 8</div>
    <div class="progress-bar-wrapper">
      <div class="progress-bar-fill" id="stepProgress" style="width:12.5%"></div>
    </div>

    <!-- Step header -->
    <div class="mb-4">
      <h2 class="step-title" id="stepTitle">Процессор</h2>
      <p class="step-desc" id="stepDesc">Выберите центральный процессор</p>
    </div>

    <!-- Compatibility warning -->
    <div class="alert d-none mb-4" id="compatWarning" role="alert">
      <span id="compatWarningText"></span>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <div id="brandsBar" class="brands-bar"></div>
      <div id="compatHint" class="compat-hint d-none"></div>
      <div class="row g-2 align-items-center">
        <div class="col-12 col-md-5">
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="searchInput" data-i18n="search_placeholder" placeholder="Поиск...">
          </div>
        </div>
        <div class="col-8 col-md-4">
          <div class="sort-dropdown" id="sortDropdown">
            <button class="sort-trigger" id="sortTrigger" onclick="toggleSortDropdown()">
              <i class="bi bi-funnel sort-trigger-icon"></i>
              <span id="sortLabel" data-i18n="sort_default">По умолчанию</span>
              <i class="bi bi-chevron-down sort-arrow" id="sortArrow"></i>
            </button>
            <div class="sort-menu" id="sortMenu">
              <div class="sort-option active" data-value="default" onclick="setSortOption('default')">
                <i class="bi bi-grid-3x3-gap"></i><span data-i18n="sort_default">По умолчанию</span>
              </div>
              <div class="sort-option" data-value="price-asc" onclick="setSortOption('price-asc')">
                <i class="bi bi-sort-up-alt"></i><span data-i18n="sort_price_asc">Цена: дешевле</span>
              </div>
              <div class="sort-option" data-value="price-desc" onclick="setSortOption('price-desc')">
                <i class="bi bi-sort-down"></i><span data-i18n="sort_price_desc">Цена: дороже</span>
              </div>
              <div class="sort-option" data-value="name-asc" onclick="setSortOption('name-asc')">
                <i class="bi bi-sort-alpha-down"></i><span data-i18n="sort_name_asc">Название: А–Я</span>
              </div>
            </div>
          </div>
        </div>
        <div class="col-4 col-md-3 text-end">
          <small class="text-muted" id="resultsCount"></small>
        </div>
      </div>
    </div>

    <!-- Component grid -->
    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-3" id="componentsGrid"></div>

    <!-- Bottom nav -->
    <div class="bottom-nav d-flex justify-content-between">
      <button class="btn btn-outline-secondary" id="btnPrevBottom" disabled>
        <i class="bi bi-chevron-left me-1"></i><span data-i18n="btn_prev">Предыдущий</span>
      </button>
      <button class="btn btn-outline-light" id="btnNextBottom">
        <span data-i18n="btn_next">Следующий</span><i class="bi bi-chevron-right ms-1"></i>
      </button>
    </div>

  </main>
</div>

<!-- ═══ COMPARE BAR ═══════════════════════════════════════════════════════════ -->
<div class="compare-bar d-none" id="compareBar">
  <div class="compare-bar-slots" id="compareBarSlots"></div>
  <div class="compare-bar-actions">
    <span class="compare-bar-count" id="compareBarCount">0 / 4</span>
    <button class="btn btn-accent btn-sm" id="btnOpenCompare" onclick="openCompareModal()" disabled>
      <i class="bi bi-bar-chart-line me-1"></i><span data-i18n="compare_btn">Сравнить</span>
    </button>
    <button class="btn btn-outline-secondary btn-sm" onclick="clearCompare()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
</div>

<!-- ═══ COMPARE MODAL ════════════════════════════════════════════════════════ -->
<div class="modal fade" id="compareModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-bar-chart-line me-2" style="color:var(--cyan)"></i><span data-i18n="compare_title">Сравнение компонентов</span>
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0" id="compareBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal" data-i18n="close">Закрыть</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ BUILD SUMMARY MODAL ══════════════════════════════════════════════════ -->
<div class="modal fade" id="summaryModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <span class="logo-text" style="font-size:1rem">CYBER<span class="accent">RIG</span></span>
          &nbsp;— <span data-i18n="your_build">Ваша сборка</span>
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="summaryBody"></div>
      <div class="modal-footer">
        <div class="me-auto d-flex align-items-baseline gap-2">
          <span class="summary-total-label" data-i18n="total_label">Итого:</span>
          <span class="summary-total-value" id="summaryTotal">$0.00</span>
        </div>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal" data-i18n="close">Закрыть</button>
        <button class="btn btn-accent btn-sm" id="btnOrder">
          <i class="bi bi-floppy me-1"></i><span data-i18n="save_build">Сохранить сборку</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ MY BUILDS MODAL ══════════════════════════════════════════════════════ -->
<div class="modal fade" id="myBuildsModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-collection me-2" style="color:var(--cyan)"></i>
          <span data-i18n="my_builds">Мои сборки</span>
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="myBuildsBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal" data-i18n="close">Закрыть</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ SCRIPTS ═══════════════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/lang.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
