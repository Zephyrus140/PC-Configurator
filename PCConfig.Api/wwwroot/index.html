<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberRig — Конфигуратор ПК</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- ═══ NAVBAR ═══════════════════════════════════════════════════════════════ -->
<nav class="top-bar">
  <div class="logo-text">CYBER<span class="accent">RIG</span></div>
  <div class="nav-total">
    <div class="total-display">
      <span class="total-label">Итого:</span>
      <span class="total-value" id="totalPriceNav">$0.00</span>
    </div>
    <button class="btn btn-accent btn-sm" data-bs-toggle="modal" data-bs-target="#summaryModal">
      <i class="bi bi-list-ul me-1"></i>Моя сборка
    </button>
  </div>
</nav>

<!-- ═══ LAYOUT ═══════════════════════════════════════════════════════════════ -->
<div class="configurator-wrapper">

  <!-- ─── SIDEBAR ─────────────────────────────────────────────────────────── -->
  <aside class="configurator-sidebar">
    <div class="sidebar-heading">Шаги конфигурации</div>
    <div id="sidebarSteps"></div>
    <div class="sidebar-footer">
      <div class="total-box">
        <div class="total-box-label">Итоговая стоимость</div>
        <div class="total-box-value" id="totalPriceSidebar">$0.00</div>
        <button class="btn btn-accent btn-sm w-100" id="btnSaveConfig">
          <i class="bi bi-card-checklist me-1"></i>Просмотр сборки
        </button>
      </div>
    </div>
  </aside>

  <!-- ─── MAIN CONTENT ─────────────────────────────────────────────────────── -->
  <main class="configurator-main">

    <!-- Progress -->
    <div class="progress-bar-label" id="stepProgressLabel">Шаг 1 / 8</div>
    <div class="progress-bar-wrapper">
      <div class="progress-bar-fill" id="stepProgress" style="width:12.5%"></div>
    </div>

    <!-- Step header -->
    <div class="d-flex align-items-start justify-content-between mb-4">
      <div>
        <h2 class="step-title" id="stepTitle">Корпус</h2>
        <p class="step-desc" id="stepDesc">Выберите корпус для вашей сборки</p>
      </div>
      <div class="d-flex gap-2 mt-1">
        <button class="btn btn-outline-secondary btn-sm" id="btnPrev" disabled>
          <i class="bi bi-chevron-left me-1"></i>Назад
        </button>
        <button class="btn btn-outline-light btn-sm" id="btnNext">
          Далее<i class="bi bi-chevron-right ms-1"></i>
        </button>
      </div>
    </div>

    <!-- Compatibility warning -->
    <div class="alert d-none mb-4" id="compatWarning" role="alert">
      <span id="compatWarningText"></span>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="row g-2 align-items-center">
        <div class="col-12 col-md-5">
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="searchInput" placeholder="Поиск...">
          </div>
        </div>
        <div class="col-8 col-md-4">
          <select class="form-select form-select-sm" id="sortSelect">
            <option value="default">По умолчанию</option>
            <option value="price-asc">Цена: по возрастанию</option>
            <option value="price-desc">Цена: по убыванию</option>
            <option value="name-asc">Название: А–Я</option>
          </select>
        </div>
        <div class="col-4 col-md-3 text-end">
          <small class="text-muted" id="resultsCount"></small>
        </div>
      </div>
    </div>

    <!-- Component grid -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="componentsGrid"></div>

    <!-- Bottom nav -->
    <div class="bottom-nav d-flex justify-content-between">
      <button class="btn btn-outline-secondary" id="btnPrevBottom" disabled>
        <i class="bi bi-chevron-left me-1"></i>Предыдущий
      </button>
      <button class="btn btn-outline-light" id="btnNextBottom">
        Следующий<i class="bi bi-chevron-right ms-1"></i>
      </button>
    </div>

  </main>
</div>

<!-- ═══ BUILD SUMMARY MODAL ══════════════════════════════════════════════════ -->
<div class="modal fade" id="summaryModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <span class="logo-text" style="font-size:1rem">CYBER<span class="accent">RIG</span></span>
          &nbsp;— Ваша сборка
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="summaryBody"></div>
      <div class="modal-footer">
        <div class="me-auto d-flex align-items-baseline gap-2">
          <span class="summary-total-label">Итого:</span>
          <span class="summary-total-value" id="summaryTotal">$0.00</span>
        </div>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Закрыть</button>
        <button class="btn btn-accent btn-sm" id="btnOrder">
          <i class="bi bi-cart-check me-1"></i>Оформить заказ
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ SCRIPTS ═══════════════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
